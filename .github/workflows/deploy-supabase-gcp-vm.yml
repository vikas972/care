# Deploy supabase_app to a GCP Compute Engine VM over SSH when changes land on supabase_Bass
#
# One-time VM setup (SSH user = GCP_VM_USER secret, e.g. ubuntu):
#   1. Reserve a static external IP on the VM (ephemeral IP changes break GCP_VM_HOST).
#   2. Generate a deploy key ON YOUR LAPTOP (no passphrase):
#        ssh-keygen -t ed25519 -f ./github-deploy-care -C "github-actions-care-deploy" -N ""
#   3. Append the PUBLIC key on the VM (do not replace the whole file if you need other keys):
#        ssh-copy-id -i ./github-deploy-care.pub USER@VM_IP
#      Or manually:
#        echo 'PASTE_PUBLIC_KEY_LINE' >> ~/.ssh/authorized_keys
#        chmod 700 ~/.ssh && chmod 600 ~/.ssh/authorized_keys
#   4. GitHub repo secrets (Settings → Secrets → Actions):
#        GCP_VM_HOST            — static VM IP or DNS
#        GCP_VM_USER            — linux user that owns ~/.ssh/authorized_keys
#        GCP_VM_SSH_PRIVATE_KEY — entire contents of github-deploy-care (including BEGIN/END lines)
#        VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY
#   5. VM: docker + ~/supabase_app/deploy/backend.env (see platform/api/.env.example)
#
# If deploy fails with "Permission denied (publickey)":
#   - Re-paste the PRIVATE key into GitHub (no extra spaces; keep newlines).
#   - Confirm the matching PUBLIC key is still in VM authorized_keys.
#   - Confirm GCP_VM_HOST matches current VM IP (use static IP).
#   - If GCP OS Login is enabled, add the key via OS Login or disable OS Login for this VM.

name: Deploy Supabase app (GCP VM)

on:
  workflow_dispatch:
  push:
    branches: [supabase_Bass]
    paths:
      - "supabase_app/**"
      - ".github/workflows/deploy-supabase-gcp-vm.yml"

concurrency:
  group: deploy-supabase-gcp-vm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Write compose build variables (frontend build-args)
        working-directory: supabase_app/deploy
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          {
            echo "VITE_SUPABASE_URL=${VITE_SUPABASE_URL}"
            echo "VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}"
            echo "VITE_API_BASE_URL=${VITE_API_BASE_URL:-}"
          } > .deploy-build.env

      - name: Sync app to VM and restart stack
        env:
          GCP_VM_HOST: ${{ secrets.GCP_VM_HOST }}
          GCP_VM_USER: ${{ secrets.GCP_VM_USER }}
          GCP_VM_SSH_PRIVATE_KEY: ${{ secrets.GCP_VM_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          test -n "${GCP_VM_HOST:-}" && test -n "${GCP_VM_USER:-}" && test -n "${GCP_VM_SSH_PRIVATE_KEY:-}" \
            || { echo "Missing GCP_VM_HOST, GCP_VM_USER, or GCP_VM_SSH_PRIVATE_KEY"; exit 1; }

          GCP_VM_HOST="$(printf '%s' "$GCP_VM_HOST" | tr -d '[:space:]')"
          GCP_VM_USER="$(printf '%s' "$GCP_VM_USER" | tr -d '[:space:]')"
          echo "GCP_VM_USER length=${#GCP_VM_USER} GCP_VM_HOST length=${#GCP_VM_HOST}"

          mkdir -p ~/.ssh
          KEY_FILE=~/.ssh/gcp_deploy
          printf '%s' "$GCP_VM_SSH_PRIVATE_KEY" | tr -d '\r' > "$KEY_FILE"
          chmod 600 "$KEY_FILE"

          if ! ssh-keygen -y -f "$KEY_FILE" >/dev/null 2>&1; then
            echo "::error::GCP_VM_SSH_PRIVATE_KEY is not a valid private key (check newlines / BEGIN-END lines)."
            exit 1
          fi
          echo "Deploy key fingerprint (must match: ssh-keygen -lf ./github-deploy-care.pub on your laptop):"
          ssh-keygen -lf "$KEY_FILE"

          REMOTE="${GCP_VM_USER}@${GCP_VM_HOST}"
          echo "Connecting to ${REMOTE} (GCP_VM_USER and GCP_VM_HOST must match your working ssh command)"
          SSH_OPTS="-i ${KEY_FILE} -o BatchMode=yes -o ConnectTimeout=20 -o ServerAliveInterval=15 -o StrictHostKeyChecking=accept-new -o IdentitiesOnly=yes"

          ssh-keyscan -H "$GCP_VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          echo "Checking SSH..."
          if ! ssh $SSH_OPTS "$REMOTE" 'echo "SSH OK — $(whoami)@$(hostname)"'; then
            echo "::group::SSH debug (last 40 lines)"
            ssh -vvv $SSH_OPTS "$REMOTE" 'true' 2>&1 | tail -40 || true
            echo "::endgroup::"
            echo "::error::SSH failed for ${REMOTE}."
            echo "1) On laptop run: ssh-keygen -lf ./github-deploy-care.pub — fingerprint must match CI above."
            echo "2) GitHub secrets: GCP_VM_USER=genaiforgex, GCP_VM_HOST=35.207.226.82, private key=file github-deploy-care."
            echo "3) On VM: grep -v '^#' ~/.ssh/authorized_keys | grep -v 'from=' | grep github-actions || fix 'from=' IP lock on deploy key."
            exit 255
          fi

          echo "Streaming app tarball to VM..."
          tar -czf - \
            --exclude 'supabase_app/node_modules' \
            --exclude 'supabase_app/dist' \
            --exclude 'supabase_app/.env' \
            --exclude 'supabase_app/.env.local' \
            --exclude 'supabase_app/platform/api/.env' \
            --exclude 'supabase_app/deploy/backend.env' \
            --exclude 'supabase_app/platform/api/.venv' \
            --exclude 'supabase_app/platform/api/__pycache__' \
            supabase_app \
            | ssh $SSH_OPTS "$REMOTE" "mkdir -p ~/supabase_app && tar -xzf - -C ~"

          echo "Rebuilding Docker stack on VM..."
          ssh $SSH_OPTS "$REMOTE" "set -euo pipefail
          echo '=== Disk before cleanup ==='
          df -h / || true
          docker system df 2>/dev/null || true
          # Free space from old build cache and unused images (keeps running containers)
          docker builder prune -af 2>/dev/null || true
          docker image prune -af 2>/dev/null || true
          echo '=== Disk after cleanup ==='
          df -h / || true
          avail=\$(df -k / | awk 'NR==2 {print \$4}')
          if [ \"\${avail:-0}\" -lt 2097152 ]; then
            echo 'ERROR: Less than 2GB free on /. Run: docker system prune -af; or resize the GCP boot disk.'
            exit 1
          fi
          cd ~/supabase_app/deploy
          docker compose --env-file .deploy-build.env up -d --build
          rm -f .deploy-build.env"
